name: Aktualizuj style i deploy na GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'plany/*.html'
      - 'css/*.css'
      - 'index*.html'

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v7

      - name: Przywróć nowoczesne style CSS
        run: |
          cp -f .github/styles/plan.css css/plan.css
          cp -f .github/styles/index.css css/index.css
          cp -f .github/styles/menu.css css/menu.css

      - name: Dodaj meta viewport do plików HTML
        run: |
          VIEWPORT='<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">'
          for f in index*.html plany/*.html; do
            [ -f "$f" ] || continue
            grep -qi 'viewport' "$f" && continue
            sed -i "s|<head>|<head>\n$VIEWPORT|" "$f"
          done

      - name: Przygotuj artefakt dla Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
